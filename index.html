<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Resume</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --color-text: #111111;
        --color-text-secondary: #6f6f6f;
        --color-divider: #1a1a1a;
        --color-bg: #ffffff;

        --font-display-xl-size: 56px;
        --font-display-xl-weight: 800;
        --font-display-xl-line: 56px;
        --font-display-xl-track: -0.02em;

        --font-heading-l-size: 36px;
        --font-heading-l-weight: 700;
        --font-heading-l-line: 40px;
        --font-heading-l-track: -0.01em;

        --font-heading-m-size: 28px;
        --font-heading-m-weight: 700;
        --font-heading-m-line: 32px;
        --font-heading-m-track: -0.01em;

        --font-title-l-size: 22px;
        --font-title-l-weight: 600;
        --font-title-l-line: 30px;
        --font-title-l-track: -0.01em;

        --font-title-m-size: 18px;
        --font-title-m-weight: 600;
        --font-title-m-line: 26px;
        --font-title-m-track: -0.005em;

        --font-body-l-size: 16px;
        --font-body-l-weight: 400;
        --font-body-l-line: 26px;

        --font-body-m-size: 15px;
        --font-body-m-weight: 400;
        --font-body-m-line: 24px;

        --font-body-s-size: 14px;
        --font-body-s-weight: 400;
        --font-body-s-line: 22px;

        --font-caption-size: 13px;
        --font-caption-weight: 400;
        --font-caption-line: 18px;

        --space-title-to-content: 24px;
        --space-title-to-paragraph: 12px;
        --space-paragraph-to-bullets: 8px;
        --space-section: 64px;
        --space-section-max: 72px;
        --space-grid: 48px;
        --page-pad-x: clamp(24px, 5vw, 72px);
        --page-pad-y: clamp(48px, 8vw, 88px);
        --resume-max: 1120px;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Inter", system-ui, sans-serif;
        background: var(--color-bg);
        color: var(--color-text);
        -webkit-font-smoothing: antialiased;
      }

      .toolbar {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        justify-content: flex-end;
        padding: 16px var(--page-pad-x);
        background: var(--color-bg);
        border-bottom: 1px solid var(--color-divider);
      }

      .btn-pdf {
        font-family: inherit;
        font-size: var(--font-caption-size);
        font-weight: 600;
        line-height: var(--font-caption-line);
        letter-spacing: 0.04em;
        text-transform: uppercase;
        padding: 10px 18px;
        border: 1px solid var(--color-text);
        background: var(--color-text);
        color: var(--color-bg);
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .btn-pdf svg {
        flex-shrink: 0;
        width: 16px;
        height: 16px;
        stroke: currentColor;
        color: inherit;
      }

      .btn-pdf:hover {
        background: #000000;
        border-color: #000000;
        color: #ffffff;
      }

      .btn-pdf:focus-visible {
        outline: 2px solid var(--color-text);
        outline-offset: 2px;
      }

      .btn-pdf:disabled {
        opacity: 0.45;
        cursor: wait;
      }

      .page {
        max-width: var(--resume-max);
        margin: 0 auto;
        padding: 0 var(--page-pad-x) var(--page-pad-y);
      }

      .resume {
        padding-top: 8px;
      }

      .resume__intro {
        padding-bottom: var(--space-section-max);
        margin-bottom: 0;
      }

      .resume__header {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        gap: 24px 32px;
        align-items: end;
        padding-bottom: 20px;
      }

      .resume__about-full {
        width: 100%;
        max-width: 100%;
        margin-top: var(--space-title-to-content);
      }

      .resume__about-full .resume__prose {
        max-width: none;
        text-align: justify;
        hyphens: auto;
        -webkit-hyphens: auto;
      }

      .resume__about-full .resume__prose + .resume__prose {
        margin-top: var(--space-title-to-paragraph);
      }

      .resume__name {
        margin: 0;
        font-size: var(--font-display-xl-size);
        font-weight: var(--font-display-xl-weight);
        line-height: var(--font-display-xl-line);
        letter-spacing: var(--font-display-xl-track);
        color: var(--color-text);
      }

      .resume__title {
        margin: 0;
        text-align: center;
        font-size: var(--font-title-m-size);
        font-weight: var(--font-title-m-weight);
        line-height: var(--font-title-m-line);
        letter-spacing: var(--font-title-m-track);
        color: var(--color-text-secondary);
        max-width: 16rem;
      }

      .resume__contact {
        justify-self: end;
        text-align: right;
        list-style: none;
        margin: 0;
        padding: 0;
      }

      .resume__contact li {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 8px;
        margin-bottom: 6px;
        font-size: var(--font-body-l-size);
        font-weight: var(--font-body-l-weight);
        line-height: var(--font-body-l-line);
        color: var(--color-text-secondary);
      }

      .resume__contact li:last-child {
        margin-bottom: 0;
      }

      .resume__contact a {
        color: inherit;
        text-decoration: none;
      }

      .resume__contact a:hover {
        text-decoration: underline;
        color: var(--color-text);
      }

      .resume__contact svg {
        flex-shrink: 0;
        width: 16px;
        height: 16px;
        color: var(--color-text-secondary);
      }

      .resume__grid {
        display: grid;
        grid-template-columns: minmax(0, 65%) minmax(0, 35%);
        gap: var(--space-grid) 56px;
        align-items: start;
        padding-top: var(--space-section);
      }

      .resume__section {
        margin-bottom: var(--space-section);
      }

      .resume__section:last-child {
        margin-bottom: 0;
      }

      .resume__section-title {
        margin: 0 0 var(--space-title-to-content);
        padding-bottom: 10px;
        border-bottom: 1px solid var(--color-divider);
        font-size: var(--font-heading-m-size);
        font-weight: var(--font-heading-m-weight);
        line-height: var(--font-heading-m-line);
        letter-spacing: var(--font-heading-m-track);
        text-transform: lowercase;
        color: var(--color-text);
      }

      .resume__main .resume__section-title {
        font-size: var(--font-heading-l-size);
        font-weight: var(--font-heading-l-weight);
        line-height: var(--font-heading-l-line);
        letter-spacing: var(--font-heading-l-track);
      }

      .resume__prose {
        margin: 0 0 var(--space-title-to-paragraph);
        font-size: var(--font-body-l-size);
        font-weight: var(--font-body-l-weight);
        line-height: var(--font-body-l-line);
        color: var(--color-text-secondary);
      }

      .resume__prose:last-child {
        margin-bottom: 0;
      }

      .resume__list {
        margin: 0;
        padding-left: 1.1em;
        font-size: var(--font-body-m-size);
        font-weight: var(--font-body-m-weight);
        line-height: var(--font-body-m-line);
        color: var(--color-text-secondary);
      }

      .resume__list li {
        margin-bottom: 6px;
      }

      .resume__list li:last-child {
        margin-bottom: 0;
      }

      .resume__edu-block + .resume__edu-block {
        margin-top: var(--space-title-to-content);
      }

      .resume__edu-period {
        margin: 0 0 4px;
        font-size: var(--font-caption-size);
        font-weight: var(--font-caption-weight);
        line-height: var(--font-caption-line);
        color: var(--color-text-secondary);
      }

      .resume__edu-degree {
        margin: 0 0 4px;
        font-size: var(--font-body-s-size);
        font-weight: 600;
        line-height: var(--font-body-s-line);
        color: var(--color-text);
      }

      .resume__edu-school {
        margin: 0;
        font-size: var(--font-body-s-size);
        font-weight: var(--font-body-s-weight);
        line-height: var(--font-body-s-line);
        color: var(--color-text-secondary);
      }

      .resume__lang {
        list-style: none;
        margin: 0;
        padding: 0;
        font-size: var(--font-body-m-size);
        line-height: var(--font-body-m-line);
        color: var(--color-text-secondary);
      }

      .resume__lang li {
        margin-bottom: 6px;
      }

      .resume__lang strong {
        font-weight: 600;
        color: var(--color-text);
      }

      .resume__tools-label {
        margin: var(--space-title-to-content) 0 8px;
        font-size: var(--font-body-s-size);
        font-weight: 600;
        line-height: var(--font-body-s-line);
        color: var(--color-text);
      }

      .resume__tools {
        margin: 0;
        font-size: var(--font-body-s-size);
        font-weight: var(--font-body-s-weight);
        line-height: var(--font-body-s-line);
        color: var(--color-text-secondary);
      }

      .resume__certs {
        margin: 0;
        padding-left: 1.1em;
        font-size: var(--font-body-s-size);
        font-weight: var(--font-body-s-weight);
        line-height: var(--font-body-s-line);
        color: var(--color-text-secondary);
      }

      .resume__certs li {
        margin-bottom: 6px;
      }

      .resume__job + .resume__job {
        margin-top: var(--space-section);
      }

      .resume__job-head {
        margin-bottom: var(--space-title-to-paragraph);
      }

      .resume__job-title {
        margin: 0 0 4px;
        font-size: var(--font-title-l-size);
        font-weight: var(--font-title-l-weight);
        line-height: var(--font-title-l-line);
        letter-spacing: var(--font-title-l-track);
        color: var(--color-text);
      }

      .resume__job-meta {
        margin: 0;
        font-size: var(--font-body-s-size);
        font-weight: var(--font-body-s-weight);
        line-height: var(--font-body-s-line);
        color: var(--color-text-secondary);
      }

      .resume__job-meta span + span::before {
        content: " · ";
      }

      .resume__job-desc {
        margin: 0 0 var(--space-paragraph-to-bullets);
        font-size: var(--font-body-m-size);
        font-weight: var(--font-body-m-weight);
        line-height: var(--font-body-m-line);
        color: var(--color-text-secondary);
      }

      .resume__job-desc:empty {
        display: none;
      }

      .resume__job-bullets {
        margin: 0;
        padding-left: 1.1em;
        font-size: var(--font-body-m-size);
        font-weight: var(--font-body-m-weight);
        line-height: var(--font-body-m-line);
        color: var(--color-text-secondary);
      }

      .resume__job-bullets li {
        margin-bottom: 6px;
      }

      .resume__footer {
        margin-top: var(--space-section-max);
        font-size: var(--font-caption-size);
        font-weight: var(--font-caption-weight);
        line-height: var(--font-caption-line);
        color: var(--color-text-secondary);
      }

      #cv.is-pdf-export {
        overflow: visible !important;
      }

      @media print {
        .toolbar {
          display: none !important;
        }

        .page {
          max-width: none;
          padding: 0;
        }
      }

      @media (max-width: 800px) {
        .resume__intro .resume__header {
          grid-template-columns: 1fr;
        }

        .resume__title {
          text-align: left;
          max-width: none;
        }

        .resume__contact li {
          justify-content: flex-start;
        }

        .resume__contact {
          justify-self: start;
          text-align: left;
        }

        .resume__grid {
          grid-template-columns: 1fr;
        }

        .resume__name {
          font-size: clamp(40px, 10vw, var(--font-display-xl-size));
          line-height: 1;
        }
      }
    </style>
  </head>
  <body>
    <header class="toolbar">
      <button type="button" class="btn-pdf" id="btn-pdf">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="7 10 12 15 17 10" />
          <line x1="12" x2="12" y1="15" y2="3" />
        </svg>
        Download PDF
      </button>
    </header>

    <div class="page">
      <article id="cv" class="resume" aria-live="polite"></article>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
      (function () {
        var ICONS = {
          location:
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>',
          email:
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>',
          phone:
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>',
          linkedin:
            '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 1 1 4.125 0 2.062 2.062 0 0 1-4.125 0zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>',
        };

        function el(tag, className, text) {
          var n = document.createElement(tag);
          if (className) n.className = className;
          if (text != null && text !== "") n.textContent = text;
          return n;
        }

        function renderContactRow(row) {
          var li = el("li");
          li.innerHTML = ICONS[row.icon] || "";
          if (row.href) {
            var a = el("a");
            a.href = row.href;
            a.textContent = row.text;
            if (row.external) {
              a.target = "_blank";
              a.rel = "noopener noreferrer";
            }
            li.appendChild(a);
          } else {
            li.appendChild(document.createTextNode(row.text));
          }
          return li;
        }

        function renderResume(data) {
          var root = document.getElementById("cv");
          root.innerHTML = "";

          var header = el("header", "resume__header");

          var nameEl = el("h1", "resume__name", data.name || "");
          header.appendChild(nameEl);

          var titleEl = el("p", "resume__title", data.title || "");
          header.appendChild(titleEl);

          var ul = el("ul", "resume__contact");
          (data.contact && data.contact.rows ? data.contact.rows : []).forEach(function (row) {
            ul.appendChild(renderContactRow(row));
          });
          header.appendChild(ul);

          var intro = el("div", "resume__intro");
          intro.appendChild(header);

          if (data.about && data.about.length) {
            var aboutSec = el("section", "resume__about-full");
            data.about.forEach(function (p) {
              aboutSec.appendChild(el("p", "resume__prose", p));
            });
            intro.appendChild(aboutSec);
          }

          root.appendChild(intro);

          var grid = el("div", "resume__grid");
          var main = el("div", "resume__main");
          var side = el("aside", "resume__sidebar");

          /* work experience (left column) */
          if (data.experience && data.experience.length) {
            var ex = el("section", "resume__section");
            ex.appendChild(el("h2", "resume__section-title", "work experience"));
            data.experience.forEach(function (job) {
              var jobEl = el("div", "resume__job");
              var head = el("div", "resume__job-head");
              head.appendChild(el("h3", "resume__job-title", job.position || ""));
              var meta = el("p", "resume__job-meta");
              if (job.company) {
                var sp = el("span", null, job.company);
                meta.appendChild(sp);
              }
              if (job.period) {
                meta.appendChild(el("span", null, job.period));
              }
              head.appendChild(meta);
              jobEl.appendChild(head);
              if (job.description) {
                jobEl.appendChild(el("p", "resume__job-desc", job.description));
              }
              if (job.bullets && job.bullets.length) {
                var bul = el("ul", "resume__job-bullets");
                job.bullets.forEach(function (b) {
                  bul.appendChild(el("li", null, b));
                });
                jobEl.appendChild(bul);
              }
              ex.appendChild(jobEl);
            });
            main.appendChild(ex);
          }

          /* right column: skills (+ tools), certificates, education, languages */
          if (data.skills && (data.skills.items || []).length) {
            var sk = el("section", "resume__section");
            sk.appendChild(el("h2", "resume__section-title", "skills"));
            var skul = el("ul", "resume__list");
            data.skills.items.forEach(function (t) {
              skul.appendChild(el("li", null, t));
            });
            sk.appendChild(skul);
            if (data.skills.tools) {
              sk.appendChild(el("p", "resume__tools-label", data.skills.toolsLabel || "Tools"));
              sk.appendChild(el("p", "resume__tools", data.skills.tools));
            }
            side.appendChild(sk);
          }

          if (data.certificates && data.certificates.length) {
            var ce = el("section", "resume__section");
            ce.appendChild(el("h2", "resume__section-title", "certificates"));
            var cul = el("ul", "resume__certs");
            data.certificates.forEach(function (c) {
              cul.appendChild(el("li", null, c));
            });
            ce.appendChild(cul);
            side.appendChild(ce);
          }

          if (data.education && data.education.length) {
            var ed = el("section", "resume__section");
            ed.appendChild(el("h2", "resume__section-title", "education"));
            data.education.forEach(function (item) {
              var block = el("div", "resume__edu-block");
              block.appendChild(el("p", "resume__edu-period", item.period || ""));
              block.appendChild(el("p", "resume__edu-degree", item.degree || ""));
              block.appendChild(el("p", "resume__edu-school", item.institution || ""));
              ed.appendChild(block);
            });
            side.appendChild(ed);
          }

          if (data.languages && data.languages.length) {
            var lang = el("section", "resume__section");
            lang.appendChild(el("h2", "resume__section-title", "languages"));
            var lul = el("ul", "resume__lang");
            data.languages.forEach(function (L) {
              var li = el("li");
              var s = el("strong", null, L.name || "");
              li.appendChild(s);
              li.appendChild(document.createTextNode(" — " + (L.level || "")));
              lul.appendChild(li);
            });
            lang.appendChild(lul);
            side.appendChild(lang);
          }

          grid.appendChild(main);
          grid.appendChild(side);
          root.appendChild(grid);

          if (data.footer) {
            root.appendChild(el("p", "resume__footer", data.footer));
          }

          document.title = (data.name || "Resume") + (data.title ? " — " + data.title : "");
        }

        /* Resolve data URL so project Pages works with or without trailing slash on the path. */
        function cvDataJsonUrl() {
          var p = location.pathname;
          if (!p.endsWith("/")) {
            if (/\.html$/i.test(p)) p = p.replace(/\/[^/]+$/, "/");
            else p += "/";
          }
          return location.origin + p + "cv-data.json";
        }

        function loadData() {
          var url = cvDataJsonUrl();
          return fetch(url, { cache: "no-store" })
            .then(function (r) {
              if (!r.ok) throw new Error(url);
              return r.json();
            })
            .then(renderResume)
            .catch(function () {
              var root = document.getElementById("cv");
              root.innerHTML =
                '<p class="resume__prose">Could not load <strong>cv-data.json</strong> from <code style="word-break:break-all">' +
                url +
                "</code>. Use the URL with a trailing slash, open via a local server, or confirm the file is deployed next to index.html.</p>";
            });
        }

        loadData();

        /* PDF */
        var btnPdf = document.getElementById("btn-pdf");
        var cv = document.getElementById("cv");

        function safeFilename() {
          var nameEl = cv.querySelector(".resume__name");
          var raw = nameEl ? nameEl.textContent.trim() : "Resume";
          var cleaned = raw.replace(/[^\p{L}\p{N}\s-]+/gu, "").replace(/\s+/g, "_");
          return (cleaned || "Resume") + ".pdf";
        }

        btnPdf.addEventListener("click", function () {
          if (typeof html2pdf === "undefined") {
            alert("Could not load PDF library. Check your connection.");
            return;
          }

          btnPdf.disabled = true;
          var name = safeFilename();
          cv.classList.add("is-pdf-export");

          var opt = {
            margin: [14, 14, 14, 14],
            filename: name,
            image: { type: "jpeg", quality: 0.98 },
            html2canvas: {
              scale: 2,
              useCORS: true,
              letterRendering: true,
              logging: false,
              backgroundColor: "#ffffff",
              onclone: function (clonedDoc) {
                var node = clonedDoc.getElementById("cv");
                if (node) node.style.color = "#111111";
              },
            },
            jsPDF: { unit: "mm", format: "a4", orientation: "portrait", compress: true },
            pagebreak: { mode: ["avoid-all", "css", "legacy"] },
          };

          document.fonts.ready
            .catch(function () {})
            .then(function () {
              return html2pdf().set(opt).from(cv).save();
            })
            .catch(function () {
              alert("Something went wrong while creating the PDF.");
            })
            .finally(function () {
              cv.classList.remove("is-pdf-export");
              btnPdf.disabled = false;
            });
        });
      })();
    </script>
  </body>
</html>
